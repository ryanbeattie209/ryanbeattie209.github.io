    <script>
      AFRAME.registerComponent("video-switcher", {
        init: function () {
          this.el.sceneEl.addEventListener("loaded", () => {
            const screen = document.querySelector("#whiteboardScreen");
            const label = document.querySelector("#screenLabel");

            const videos = {
              solar: document.querySelector("#videoSolar"),
              motion: document.querySelector("#videoMotion"),
              circuits: document.querySelector("#videoCircuits"),
            };

            const labels = {
              solar: " ",
              motion: " ",
              circuits: " ",
            };

            const videoKeys = {
              solar: "videoSolar",
              motion: "videoMotion",
              circuits: "videoCircuits",
            };

            let currentVideo = null;
            let unlocked = false;

            function unlock() {
              if (unlocked) return;
              unlocked = true;
              Object.values(videos).forEach((v) => {
                v.muted = true;
                v.play()
                  .then(() => {
                    v.pause();
                    v.muted = false;
                    v.currentTime = 0;
                  })
                  .catch(() => {
                    v.muted = false;
                  });
              });
            }

            function switchVideo(id) {
              unlock();

              // Pause and reset all videos
              Object.values(videos).forEach((v) => {
                v.pause();
                v.currentTime = 0;
              });

              currentVideo = videos[id];

              // Swap texture
              screen.setAttribute(
                "material",
                "shader: flat; src: #" + videoKeys[id] + "; color: #ffffff"
              );

              label.setAttribute("value", labels[id]);

              // Play selected video with muted fallback for gesture policy
              currentVideo.muted = true;
              currentVideo
                .play()
                .then(() => {
                  currentVideo.muted = false;
                })
                .catch((e) => {
                  console.warn("Play blocked:", e);
                });
            }

            function pauseVideo() {
              if (currentVideo) {
                if (currentVideo.paused) {
                  currentVideo
                    .play()
                    .catch((e) => console.warn("Resume blocked:", e));
                  label.setAttribute(
                    "value",
                    label.getAttribute("value").replace("⏸ ", "▶ ")
                  );
                } else {
                  currentVideo.pause();
                  label.setAttribute(
                    "value",
                    "⏸ " + label.getAttribute("value").replace("▶ ", "")
                  );
                }
              }
            }

            document
              .querySelector("#btnYellow")
              .addEventListener("click", () => switchVideo("solar"));
            document
              .querySelector("#btnBlue")
              .addEventListener("click", () => switchVideo("motion"));
            document
              .querySelector("#btnRed")
              .addEventListener("click", () => switchVideo("circuits"));
            document
              .querySelector("#btnPause")
              .addEventListener("click", () => pauseVideo());
          });
        },
      });
    </script>

<script>
AFRAME.registerComponent("solar-system-task", {
  init: function () {

    const order = [
      "Mercury","Venus","Earth","Mars",
      "Jupiter","Saturn","Uranus","Neptune"
    ];

    const orbitRadii = [0.12,0.16,0.20,0.24,0.28,0.32,0.36,0.40];

    let currentIndex = 0;
    let orbiting = false;

    const planets = Array.from(this.el.querySelectorAll(".planet"));
    const sun = this.el.querySelector("#sun");

    // Shuffle helper
    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    // Layout planets in a straight row above table
    function layoutRow() {
      const remaining = planets.filter(p => !p.dataset.placed);
      const shuffled = shuffle([...remaining]);

      shuffled.forEach((planet, i) => {
        const x = -0.35 + i * 0.1;
        planet.setAttribute("position", `${x} 0.22 -0.25`);
      });
    }

    // Reset everything
    function resetSystem() {
      currentIndex = 0;
      orbiting = false;

      planets.forEach(p => {
        delete p.dataset.placed;
        p.removeAttribute("animation__orbit");
        p.object3D.rotation.set(0,0,0);
      });

      layoutRow();
    }

    // Place correctly onto orbit
    function placePlanet(planet, index) {
      const r = orbitRadii[index];

      // Place EXACTLY on ring (same Y as rings)
      planet.setAttribute("position", `${r} 0.05 0`);

      planet.dataset.placed = true;
      planet.dataset.orbitIndex = index;
    }

    // Start orbit animation
    function startOrbit() {
      orbiting = true;

      const orbitDurations = [
        2400, 6200, 10000, 18800,
        118600, 294600, 840100, 1648000
      ];

      planets.forEach((planet, i) => {
        const r = orbitRadii[i];

        let angle = 0;

        function animate() {
          if (!orbiting) return;

          angle += (360 / orbitDurations[i]) * 16;
          const rad = angle * Math.PI / 180;

          const x = Math.cos(rad) * r;
          const z = Math.sin(rad) * r;

          planet.setAttribute("position", `${x} 0.05 ${z}`);
          requestAnimationFrame(animate);
        }

        animate();
      });
    }

    // Click handling
    planets.forEach(planet => {
      planet.addEventListener("click", () => {

        if (orbiting) return;
        if (planet.dataset.placed) return;

        const name = planet.getAttribute("id");

        if (name === order[currentIndex]) {
          placePlanet(planet, currentIndex);
          currentIndex++;

          layoutRow();

          if (currentIndex === order.length) {
            startOrbit();
          }

        } else {
          resetSystem();
        }
      });
    });

    // Sun = reset button
    sun.addEventListener("click", () => {
      resetSystem();
    });

    // Initial layout
    layoutRow();
  }
});
</script>

<script>
AFRAME.registerComponent("weight-puzzle", {
  init: function () {

    const blocks = Array.from(document.querySelectorAll(".movable"));
    const slots = Array.from(document.querySelectorAll(".drop-slot"));
    const resultText = document.querySelector("#resultText");
    const resetBtn = document.querySelector("#resetBtn");

    let mysteryWeight = 0;
    let slotState = [null, null, null];

    const possibleWeights = [1, 2, 3];

    // SETUP / RESET
    function resetPuzzle() {

      // Random target (harder range)
      mysteryWeight = Math.floor(Math.random() * 5) + 3; // 3–7

      slotState = [null, null, null];

      resultText.setAttribute("value", "Match the weight");

      // Reset blocks
      blocks.forEach((block, i) => {

        let weight = possibleWeights[Math.floor(Math.random() * possibleWeights.length)];
        block.dataset.weight = weight;

        block.setAttribute("position", JSON.parse(block.dataset.home));
        block.dataset.placed = "false";
        block.dataset.slot = -1;

        // Update visible number
        block.querySelector("a-text").setAttribute("value", weight);
      });

      // Reset slots colour
      slots.forEach(s => s.setAttribute("color", "#2ecc71"));
    }

    // SLOT CLICK
    let selectedSlot = null;

    slots.forEach((slot, index) => {
      slot.addEventListener("click", () => {

        selectedSlot = index;

        slots.forEach(s => s.setAttribute("color", "#2ecc71"));
        slot.setAttribute("color", "#f1c40f");
      });
    });

    // BLOCK LOGIC
    blocks.forEach((block) => {

      block.dataset.home = JSON.stringify(block.getAttribute("position"));

      block.addEventListener("click", () => {

        // REMOVE
        if (block.dataset.placed === "true") {

          let oldSlot = parseInt(block.dataset.slot);
          slotState[oldSlot] = null;

          block.setAttribute("position", JSON.parse(block.dataset.home));

          block.dataset.placed = "false";
          block.dataset.slot = -1;

          checkAnswer();
          return;
        }

        // PLACE
        if (selectedSlot === null) return;
        if (slotState[selectedSlot]) return;

        const slot = slots[selectedSlot];

        block.setAttribute("position", {
          x: slot.object3D.position.x,
          y: 0.14,
          z: slot.object3D.position.z
        });

        block.dataset.placed = "true";
        block.dataset.slot = selectedSlot;

        slotState[selectedSlot] = block;

        checkAnswer();
      });
    });

    // CHECK LOGIC
    function checkAnswer() {

      let total = 0;

      slotState.forEach((block) => {
        if (block) total += parseInt(block.dataset.weight);
      });

      if (total === mysteryWeight) {
        resultText.setAttribute("value", "✅ Correct");
        resultText.setAttribute("color", "#2ecc71");
      }
      else if (total > mysteryWeight) {
        resultText.setAttribute("value", "Too Heavy");
        resultText.setAttribute("color", "#e74c3c");
      }
      else {
        resultText.setAttribute("value", "Too Light");
        resultText.setAttribute("color", "#f1c40f");
      }
    }

    // RESET BUTTON
    resetBtn.addEventListener("click", resetPuzzle);

    // Initial start
    resetPuzzle();
  }
});
</script>

<script>
AFRAME.registerComponent("circuit-system", {
  init: function () {

    const slots = document.querySelectorAll(".slot");
    const components = document.querySelectorAll(".component");
    const bulb = document.querySelector("#bulb");

    let selected = null;

    // Correct solution
    const solution = ["wire", "switch", "wire"];

    // Select component
    components.forEach(btn => {
      btn.addEventListener("click", () => {
        selected = btn.dataset.type;
      });
    });

    // Place into slot
    slots.forEach((slot, index) => {
      slot.addEventListener("click", () => {

        if (!selected) return;

        slot.dataset.filled = selected;

        if (selected === "wire") {
          slot.setAttribute("color", "#00ffff");
        }

        if (selected === "switch") {
          slot.setAttribute("color", "#2ecc71");
        }

        checkCircuit();
      });
    });

    function checkCircuit() {
      let correct = true;

      slots.forEach((slot, i) => {
        if (slot.dataset.filled !== solution[i]) {
          correct = false;
        }
      });

      if (correct) {
        bulb.setAttribute("color", "#ffff00");
      } else {
        bulb.setAttribute("color", "#ffffcc");
      }
    }

    document.querySelector("#resetCircuit")
      .addEventListener("click", () => {

        slots.forEach(slot => {
          slot.dataset.filled = null;
          slot.setAttribute("color", "#555");
        });

        bulb.setAttribute("color", "#ffffcc");
        selected = null;
      });
  }
});
</script>
